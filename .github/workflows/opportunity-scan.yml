name: Forex opportunity scan

# Hourly: hits /api/cron/scan-opportunities so Claude analyzes the majors and
# pushes the best high-conviction setup to your phone. Alert-only (never trades).
# Vercel Hobby allows only 2 crons (already used), so this runs from here.
#
# Setup — add two repo secrets (Settings → Secrets and variables → Actions):
#   SCAN_URL    = https://<your-vercel-domain>/api/cron/scan-opportunities
#   CRON_SECRET = the same value set in Vercel env
#
# Note: GitHub's scheduler is best-effort; runs may drift a few minutes. The
# route itself skips quietly when the forex market is closed.

on:
  schedule:
    - cron: '0 * * * *' # top of every hour
  workflow_dispatch:
    inputs:
      force:
        description: "Force a test trade even if the AI finds no premium setup"
        type: boolean
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Hit opportunity-scan endpoint
        run: |
          URL="$SCAN_URL"
          if [ "${{ inputs.force }}" = "true" ]; then URL="$SCAN_URL?force=1"; fi
          echo "Calling $URL"
          code=$(curl -sS -o response.txt -w "%{http_code}" -H "Authorization: Bearer $CRON_SECRET" "$URL")
          echo "HTTP $code"; cat response.txt; echo
          if [ "$code" != "200" ]; then
            echo "::error::Expected HTTP 200, got $code. A 3xx means the URL redirects — set the secret to the canonical https://www.poshkan.com URL."
            exit 1
          fi
        env:
          SCAN_URL: ${{ secrets.SCAN_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
