# Publishes server.json to the official MCP Registry (registry.modelcontextprotocol.io).
# Run manually from the Actions tab. Auth is GitHub OIDC — no secrets to manage; the
# io.github.afrazja/* namespace is proven by the workflow running in this repo.
name: Publish to MCP Registry

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
